<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Para nosotros 🤍</title>

<link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
:root {
    --lila: #C8A2C8;
    --lila-fuerte: #A66FA6;
    --lila-suave: #EBD6EB;
    --negro: #1A1A1A;
}

body {
    font-family: 'Poppins', sans-serif;
    margin: 0;
    padding: 20px;
    max-width: 600px;
    margin: auto;
    background: linear-gradient(to bottom, var(--lila-suave), white);
    color: var(--negro);
    text-align: center;
    overflow: hidden;
}

/* 💜 título */
h1 {
    font-family: 'Great Vibes', cursive;
    font-size: 42px;
    color: var(--lila-fuerte);
    opacity: 0;
    animation: fade 1.5s forwards;
}

/* 💌 mensaje */
p {
    margin-top: 20px;
    line-height: 1.6;
    opacity: 0;
    animation: fade 2s forwards;
    animation-delay: 1s;
}

/* 🔘 botón */
button {
    margin-top: 30px;
    background: var(--lila);
    color: white;
    border: none;
    padding: 12px 20px;
    border-radius: 10px;
    font-size: 16px;
    cursor: pointer;
    transition: 0.3s;
    opacity: 0;
    animation: fade 2s forwards;
    animation-delay: 2s;
}

button:hover {
    background: var(--lila-fuerte);
    transform: scale(1.05);
}

/* ✨ fade */
@keyframes fade {
    to { opacity: 1; }
}

/* 💫 corazones flotando */
.heart {
    position: fixed;
    bottom: -10px;
    font-size: 20px;
    animation: subir 6s linear infinite;
    opacity: 0.7;
}

@keyframes subir {
    from {
        transform: translateY(0);
    }
    to {
        transform: translateY(-110vh);
    }
}
</style>
</head>

<body>

<h1>Para nosotros 🤍</h1>

<p>
    después de todo lo que viste...<br><br>
    quiero que entiendas algo simple:<br><br>
    yo te sigo eligiendo 🤍<br><br>
    hoy, mañana y en todos los momentos que vengan...<br><br>
    porque al final de todo,<br>
    siempre vas a ser tú 🤍
</p>

<button onclick="ir('/')">volver al inicio 🤍</button>

<script>
/* 💫 corazones flotando */
function crearCorazon() {
    const heart = document.createElement("div");
    heart.classList.add("heart");
    heart.innerText = "🤍";

    heart.style.left = Math.random() * 100 + "vw";
    heart.style.fontSize = (15 + Math.random() * 20) + "px";
    heart.style.animationDuration = (4 + Math.random() * 3) + "s";

    document.body.appendChild(heart);

    setTimeout(() => {
        heart.remove();
    }, 6000);
}

setInterval(crearCorazon, 600);

/* 🔄 navegación */
function ir(ruta) {
    window.location.href = ruta;
}
</script>

</body>
</html>
