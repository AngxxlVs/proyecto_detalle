<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Para nosotros 🤍</title>

<link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">

<style>
body {
    color: var(--negro);
    overflow: hidden;
}

h1 {
    opacity: 0;
    animation: fade 1.5s forwards;
}

p {
    margin-top: 20px;
    line-height: 1.6;
    opacity: 0;
    animation: fade 2s forwards;
    animation-delay: 1s;
}

button {
    margin-top: 30px;
    padding: 12px 20px;
    opacity: 0;
    animation: fade 2s forwards;
    animation-delay: 2s;
}

@keyframes fade {
    to { opacity: 1; }
}

.floating-heart {
    position: fixed;
    bottom: -10px;
    font-size: 20px;
    animation: subir 6s linear infinite;
    opacity: 0.7;
}

@keyframes subir {
    from { transform: translateY(0); }
    to { transform: translateY(-110vh); }
}
</style>
</head>

<body>

<h1>Para nosotros 🤍</h1>

<p>
    después de todo lo que viste...<br><br>
    quiero que entiendas algo simple:<br><br>
    yo te sigo eligiendo 🤍<br><br>
    hoy, mañana y en todos los momentos que vengan...<br><br>
    porque al final de todo,<br>
    siempre vas a ser tú 🤍
</p>

<button onclick="ir('/')">volver al inicio 🤍</button>

<script>
/* 💫 corazones flotando */
function crearCorazon() {
    const heart = document.createElement("div");
    heart.classList.add("floating-heart");
    heart.innerText = "🤍";

    heart.style.left = Math.random() * 100 + "vw";
    heart.style.fontSize = (15 + Math.random() * 20) + "px";
    heart.style.animationDuration = (4 + Math.random() * 3) + "s";

    document.body.appendChild(heart);

    setTimeout(() => {
        heart.remove();
    }, 6000);
}

setInterval(crearCorazon, 600);

/* 🔄 navegación */
function ir(ruta) {
    window.location.href = ruta;
}
</script>

</body>
</html>
