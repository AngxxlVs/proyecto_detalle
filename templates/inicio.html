<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Para ti 🤍</title>

<link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
:root {
    --lila: #C8A2C8;
    --lila-fuerte: #A66FA6;
    --lila-suave: #EBD6EB;
}

body {
    font-family: 'Poppins', sans-serif;
    margin: 0;
    padding: 20px;
    max-width: 600px;
    margin: auto;
    background: linear-gradient(to bottom, var(--lila-suave), white);
    text-align: center;
}

h1 {
    font-family: 'Great Vibes', cursive;
    font-size: 42px;
    color: var(--lila-fuerte);
}

button {
    display: block;
    width: 80%;
    margin: 15px auto;
    background: var(--lila);
    color: white;
    border: none;
    padding: 14px;
    border-radius: 12px;
    font-size: 16px;
    cursor: pointer;
    transition: 0.3s;
}

button:hover {
    background: var(--lila-fuerte);
    transform: scale(1.05);
}

/* 🔒 botón bloqueado */
button:disabled {
    background: #ccc;
    cursor: not-allowed;
}

/* 💜 botón final */
.final-btn {
    background: #8e5a8e;
}

.aviso {
    font-size: 13px;
    color: #555;
    margin-top: -5px;
}

/* 💜 loader */
#loader {
    position: fixed;
    inset: 0;
    background: white;
    display: none;
    z-index: 9999;
}

#loader .contenido {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    text-align: center;
}

.heart {
    font-size: 50px;
    animation: latido 1s infinite;
}

@keyframes latido {
    50% { transform: scale(1.3); }
}
</style>
</head>

<body>

<h1>Para tu 🤍</h1>
<p>con cariño de: tu mierdita de ayer JAJA 🤍</p>

<button onclick="ir('/eleccion')">¿Por qué te amo? 🤍</button>
<button onclick="ir('/razones')">Mis razones 🤍</button>

<!-- 🔥 BOTÓN FINAL BLOQUEADO -->
<button id="finalBtn" class="final-btn" onclick="ir('/final')" disabled>
🔒 Ver final 🤍
</button>

<p id="aviso" class="aviso">abre este al final...</p>

<!-- 💜 LOADER -->
<div id="loader">
    <div class="contenido">
        <div class="heart">🤍</div>
        <p>Cargando...</p>
    </div>
</div>

<script>
function ir(ruta) {
    document.getElementById("loader").style.display = "block";
    setTimeout(() => {
        window.location.href = ruta;
    }, 1200);
}

/* 🔓 verificar progreso */
function verificarProgreso() {
    const vioEleccion = localStorage.getItem("vioEleccion");
    const vioRazones = localStorage.getItem("vioRazones");

    const btn = document.getElementById("finalBtn");
    const aviso = document.getElementById("aviso");

    if (vioEleccion && vioRazones) {
        btn.disabled = false;
        btn.innerText = "Ver final 🤍";
        btn.style.background = "#A66FA6";
        aviso.innerText = "ya puedes abrirlo 🤍";
    }
}

verificarProgreso();
</script>

</body>
</html>
