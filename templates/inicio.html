<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Para ti 🤍</title>

<link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">

</head>

<body>

<h1>Para tu 🤍</h1>
<p>con cariño de: tu mierdita de ayer JAJA 🤍</p>

<button onclick="ir('/eleccion')">¿Por qué te amo? 🤍</button>
<button onclick="ir('/razones')">Mis razones 🤍</button>

<!-- 🔥 BOTÓN FINAL BLOQUEADO -->
<button id="finalBtn" class="final-btn" onclick="ir('/final')" disabled>
🔒 Ver final 🤍
</button>

<p id="aviso" class="aviso">abre este al final...</p>

<!-- 💜 LOADER -->
<div id="loader">
    <div class="contenido">
        <div class="heart">🤍</div>
        <p>Cargando...</p>
    </div>
</div>

<script>
function ir(ruta) {
    document.getElementById("loader").style.display = "block";
    setTimeout(() => {
        window.location.href = ruta;
    }, 1200);
}

/* 🔓 verificar progreso */
function verificarProgreso() {
    const vioEleccion = localStorage.getItem("vioEleccion");
    const vioRazones = localStorage.getItem("vioRazones");

    const btn = document.getElementById("finalBtn");
    const aviso = document.getElementById("aviso");

    if (vioEleccion && vioRazones) {
        btn.disabled = false;
        btn.innerText = "Ver final 🤍";
        btn.style.background = "#A66FA6";
        aviso.innerText = "ya puedes abrirlo 🤍";
    }
}

verificarProgreso();
</script>

</body>
</html>
